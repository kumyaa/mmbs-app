name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      # Inject the real service_account.json from the SERVICE_ACCOUNT_JSON
      # secret. If the secret is missing (forks, first-time builds before the
      # owner sets it), fall back to a placeholder so the scaffold still
      # builds — runtime auth will fail with AuthNotConfiguredException.
      - name: Write service account asset
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p app/src/main/assets
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$SERVICE_ACCOUNT_JSON" > app/src/main/assets/service_account.json
            echo "Wrote service_account.json from secret ($(wc -c < app/src/main/assets/service_account.json) bytes)"
          else
            echo '{"placeholder":true}' > app/src/main/assets/service_account.json
            echo "::warning::SERVICE_ACCOUNT_JSON secret missing — APK will not authenticate."
          fi

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Report APK sizes
        run: |
          echo "## APK sizes" >> $GITHUB_STEP_SUMMARY
          echo '| Variant | Size |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY
          for f in app/build/outputs/apk/*/*.apk; do
            size=$(du -h "$f" | cut -f1)
            echo "| $(basename "$f") | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mmbs-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: mmbs-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
